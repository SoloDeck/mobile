name: solodesk_mobile
description: SoloDesk Mobile — AI-powered CRM for Vietnamese freelancers.
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.3.0

  # Networking
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0

  # Code generation — serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Local database
  drift: ^2.26.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.6
  path: ^1.9.1

  # Secure storage
  flutter_secure_storage: ^10.3.1

  # Authentication
  google_sign_in: ^7.0.0

  # UI
  google_fonts: ^8.1.0
  shimmer: ^3.0.0
  intl: ^0.20.2

  # Utilities
  equatable: ^2.0.7
  logger: ^2.5.0
  envied: ^1.3.7

  # Voice / permissions
  speech_to_text: ^7.0.0
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.4-dev.1
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.9.5
  drift_dev: ^2.26.1
  envied_generator: ^1.1.1
  mockito: ^5.4.5
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
